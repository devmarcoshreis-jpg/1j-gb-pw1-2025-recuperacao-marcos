<!DOCTYPE html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jokenpo!</title>
    <link rel="stylesheet" href="./css/styles.css">
    <style>
       
    </style>
  </head>
  <body>
    <header>
      <h1>Seja Bem-vindo Jogador!</h1>
    </header>
    <main>
        <div class="cadastro">
          <h1 class="onda">
            <span>J</span>
            <span>o</span>
            <span>-</span>
            <span>k</span>
            <span>e</span>
            <span>n</span>
            <span>-</span>
            <span>p</span>
            <span>o</span>
            <span>!</span>
          </h1>
        </div>
     
      <h3>Registre-se agora!</h3>
      <form>
        <div class="info">
          Nome:
          <input type="text" name="nome" class="inpt">
        </div>
        <div class="info">
          Idade:
          <input type="number" name="idade" class="inpt">
        </div>
        <div class="info">
          Gênero:
          <br>
          <input type="radio" name="sexo" value="m"> Masculino
          <input type="radio" name="sexo" value="f"> Feminino
          <input type="radio" name="sexo" value="ni" checked> Não informar
        </div>
        <div class="userProfile">
          <img id="jogador" src="./assets/images/desconhecido.png" alt="Foto de Perfil">
        </div>
        <div>
          <button type="submit" name="botao" >Cadastrar</button>
        </div>       
      </form>
    </main>
    <footer>
      <p>
        jkdfsas
      </p>
    </footer>
  </body>

  <script>
const sexo = document.querySelectorAll('input[name="sexo"]');
const perfil = document.querySelector('#jogador');

sexo.forEach(radio => {
  radio.addEventListener('change', () => {
    if (radio.value === 'm') {
      perfil.src = './assets/images/usuario.png';
    } else if (radio.value === 'f') {
      perfil.src = './assets/images/usuaria.png';
    } else {
      perfil.src = './assets/images/desconhecido.png';
    }
  });
});

const form = document.querySelector('form');

form.addEventListener('submit', (event) => {
  event.preventDefault();

  const usuario = {
    nome: form.elements['nome'].value,
    idade: form.elements['idade'].value,
    sexo: form.querySelector('input[name="sexo"]:checked').value
  };

  sessionStorage.setItem("nome", usuario.nome);
  sessionStorage.setItem("idade", usuario.idade);
  sessionStorage.setItem("sexo", usuario.sexo);

  window.location.href = 'jokenpo.html';
});

</script>

  
</html>
