<!DOCTYPE html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jokenpo!</title>
    <link rel="stylesheet" href="./css/styles.css">
  </head>
  <body>
    <header>
      <h1 class="destacar">Seja Bem-vindo Jogador!</h1>
    </header>
    <main>
        <div class="cadastro">
          <h1 class="onda">
            <span>J</span>
            <span>o</span>
            <span>-</span>
            <span>k</span>
            <span>e</span>
            <span>n</span>
            <span>-</span>
            <span>p</span>
            <span>o</span>
            <span>!</span>
          </h1>
        </div>
     
      <h2>Registre-se agora!</h2>
      <form>
        <div class="info">
          Nome:
          <input type="text" name="nome" class="inpt">
        </div>
        <div class="info">
          Idade:
          <input type="number" name="idade" class="inpt">
        </div>
        <div class="info">
          Gênero:
          <br>
          <input type="radio" name="sexo" value="m"> Masculino
          <input type="radio" name="sexo" value="f"> Feminino
          <input type="radio" name="sexo" value="ni" checked> Não informar
        </div>
        <div class="userProfile">
          <img id="jogador"  class="formatacao" src="./assets/images/desconhecido.png" alt="Foto de Perfil">
        </div>
        <div>
          <button type="submit" name="botao" >Cadastrar</button>
        </div>       
      </form>
    </main>
    <footer>
         <div class="moreInfo">
          Espero que possa se divertir com esse pequeno projeto :)
          <br>
          Desenvolvido por Marcos Reis — 2025
          <br>
          Ícones e imagens por <a href="https://www.flaticon.com/br/">FlatIcons</a> — Uso educacional
          <br>
          Contato: <a href="mailto:dev.marcos.h.reis@gmail.com">dev.marcos.h.reis@gmail.com</a>
        </div>
    </footer>
  <script>

    const botao = document.getElementsByName ('botao')[0];
    const nome = document.getElementsByName ('nome')[0];
    const idade = document.getElementsByName('idade')[0];
    const perfil = document.querySelector('#jogador');
    const sexo = document.querySelectorAll('input[name="sexo"]');

    sexo.forEach(radio => {
      radio.addEventListener('change', () => {
        if (radio.value === 'm') {
          perfil.src = './assets/images/usuario.png';
        } else if (radio.value === 'f') {
          perfil.src = './assets/images/usuaria.png';
        } else {
          perfil.src = './assets/images/desconhecido.png';
        }
      });
    });
    
    const form = document.querySelector('form');

    form.addEventListener('submit', (event) => {
      event.preventDefault();

      if(nome.value.trim()===''||idade.value ===''|| isNaN(Number(idade.value))){
        alert("Preencha todos os campos para poder continuar!")
        return;
      } 

      const usuario = {
        nome: form.elements['nome'].value,
        idade: form.elements['idade'].value,
        sexo: form.querySelector('input[name="sexo"]:checked').value
      };
      
      let lista = JSON.parse(sessionStorage.getItem("jogadores")) || [];

      lista.push(usuario);
      sessionStorage.setItem("jogadores", JSON.stringify(lista));
      window.location.href = 'jokenpo.html';
    });
</script>
</html>
